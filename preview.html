<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Preview — Invoice Studio</title>
  <link rel="stylesheet" href="assets/css/app.css">
  <link rel="stylesheet" href="assets/css/invoice.css">
  <style>
    /* Live mode (iframe inside editor): no chrome, no shadow. */
    body.live-mode .toolbar { display: none; }
    body.live-mode { background: #fff; }
    body.live-mode .print-root { margin: 0 auto; box-shadow: none; }
  </style>
</head>
<body>
  <div class="toolbar no-print" id="toolbar">
    <h1 class="toolbar__title" id="toolbar-title">Document</h1>
    <span class="pill" id="toolbar-status">draft</span>
    <span class="toolbar__spacer"></span>

    <a class="btn btn--ghost" href="index.html">← Dashboard</a>
    <a class="btn" id="btn-edit" href="#">✏️ Edit</a>

    <select class="field__select" id="status-select" style="width:auto;">
      <option value="draft">Draft</option>
      <option value="sent">Sent</option>
      <option value="paid">Paid</option>
      <option value="overdue">Overdue</option>
      <option value="converted">Converted</option>
    </select>

    <button class="btn" id="btn-convert" style="display:none;">🔄 Convert to Invoice</button>
    <button class="btn" id="btn-print">🖨 Print</button>
    <button class="btn btn--primary" id="btn-pdf">⬇ Download PDF</button>
  </div>

  <div class="print-root" id="print-root"></div>

  <div class="toast-host" id="toast-host"></div>

  <script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.2/dist/html2pdf.bundle.min.js"></script>

  <script src="assets/js/store.js"></script>
  <script src="assets/js/numbering.js"></script>
  <script src="assets/js/calc.js"></script>
  <script src="assets/js/render.js"></script>
  <script src="assets/js/pdf.js"></script>
  <script src="assets/js/convert.js"></script>

  <script>
    (function () {
      var qs = new URLSearchParams(location.search);
      var docId = qs.get('id');
      var liveMode = qs.get('live') === '1';

      if (liveMode) document.body.classList.add('live-mode');

      var root = document.getElementById('print-root');

      // ---- Live iframe API: parent calls window.applyLiveData(doc, profile, client). ----
      // Used by the editor to push form state in without ever writing to localStorage.
      window.applyLiveData = function (doc, profile, client) {
        if (!doc || !profile) {
          root.innerHTML = '<div class="empty" style="margin:48px;"><h3>Pick a profile to preview</h3></div>';
          return;
        }
        root.innerHTML = Render.renderDocument(doc, profile, client, Store.getSettings());
      };

      // Tell the editor we're ready to receive data.
      if (liveMode && window.parent && window.parent !== window) {
        try { window.parent.postMessage({ type: 'preview-ready' }, '*'); } catch (e) {}
      }

      // In live-mode-with-id, we can still render from store (used by editor's
      // initial render before postMessage handshake completes).
      if (liveMode) {
        if (docId) {
          var doc = Store.getDocument(docId);
          if (doc) root.innerHTML = Render.renderById(docId);
        }
        return; // skip toolbar wiring entirely
      }

      // ---- Normal preview mode (with id) ----
      var doc = docId ? Store.getDocument(docId) : null;
      if (!doc) {
        root.innerHTML = '<div class="empty" style="margin:48px;"><h3>Document not found</h3>'
                       + '<p>The document you\'re looking for doesn\'t exist or was deleted.</p>'
                       + '<a class="btn btn--primary" href="index.html">Back to dashboard</a></div>';
        document.getElementById('toolbar').style.display = 'none';
        return;
      }

      function rerender() {
        doc = Store.getDocument(docId);
        root.innerHTML = Render.renderById(docId);
        document.getElementById('toolbar-title').textContent =
          (doc.type === 'proforma' ? 'Proforma ' : 'Invoice ') + doc.number;
        var pill = document.getElementById('toolbar-status');
        pill.textContent = doc.status;
        pill.className = 'pill pill--' + doc.status;
        document.getElementById('status-select').value = doc.status;
        document.getElementById('btn-edit').href = 'editor.html?id=' + encodeURIComponent(docId);
        document.getElementById('btn-convert').style.display =
          (doc.type === 'proforma' && !doc.convertedToId) ? '' : 'none';
      }
      rerender();

      document.getElementById('status-select').addEventListener('change', function (e) {
        doc.status = e.target.value;
        Store.saveDocument(doc);
        rerender();
        toast('Status updated to ' + doc.status);
      });

      document.getElementById('btn-print').addEventListener('click', function () { window.print(); });

      document.getElementById('btn-pdf').addEventListener('click', function () {
        var btn = this;
        btn.disabled = true; btn.textContent = '⏳ Generating…';
        PDF.exportDocument(docId).then(function () {
          btn.disabled = false; btn.textContent = '⬇ Download PDF';
          toast('PDF downloaded');
        }).catch(function (err) {
          console.error(err);
          btn.disabled = false; btn.textContent = '⬇ Download PDF';
          toast('PDF export failed: ' + err.message, 'error');
        });
      });

      document.getElementById('btn-convert').addEventListener('click', function () {
        var newId = Convert.proformaToInvoice(docId);
        if (newId) location.href = 'editor.html?id=' + encodeURIComponent(newId);
      });

      function toast(msg, kind) {
        var host = document.getElementById('toast-host');
        var el = document.createElement('div');
        el.className = 'toast' + (kind === 'error' ? ' toast--error' : ' toast--success');
        el.textContent = msg;
        host.appendChild(el);
        setTimeout(function () { el.remove(); }, 2400);
      }
    })();
  </script>
</body>
</html>
